---
- name: Create required output directories if not present
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0775"
  loop:
    - "{{ vyos_config_deploy_ssh_post_running_config_backup_dir }}"
    - "{{ vyos_config_deploy_ssh_pre_running_config_backup_dir }}"
    - "{{ vyos_config_deploy_ssh_config_diff_dir }}"
  delegate_to: localhost
  run_once: true

- name: Retrieve remote configuration
  vyos.vyos.vyos_config:
    backup: true
    backup_options:
      dir_path: "{{ vyos_config_deploy_ssh_config_diff_dir }}"
      filename: "{{ vyos_config_deploy_ssh_pre_running_config_backup_filename }}"

- name: Diff the running config against the intended config
  ansible.builtin.copy:
    src: "{{ vyos_config_deploy_ssh_config_dir }}/{{ inventory_hostname }}.cfg"
    dest: "{{ vyos_config_deploy_ssh_config_diff_dir }}/{{ vyos_config_deploy_ssh_pre_running_config_backup_filename }}"
    mode: "0775"
  delegate_to: localhost
  check_mode: true
  diff: true
